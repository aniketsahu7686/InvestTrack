<mat-toolbar color="primary" class="navbar">
  <!-- Brand -->
  <a class="brand" routerLink="/">
    <mat-icon>insights</mat-icon>
    <span>InvestTrack</span>
  </a>

  <span class="spacer"></span>

  <!-- Navigation Links -->
  <div class="nav-links">
    <a mat-button class="nav-link" routerLink="/trades" routerLinkActive="active-link">
      <mat-icon>list_alt</mat-icon>
      <span class="nav-label"> Trade Ideas</span>
    </a>

    <a mat-button class="nav-link" routerLink="/leaderboard" routerLinkActive="active-link">
      <mat-icon>emoji_events</mat-icon>
      <span class="nav-label"> Leaderboard</span>
    </a>

    <a mat-button class="nav-link" routerLink="/prices" routerLinkActive="active-link">
      <mat-icon>show_chart</mat-icon>
      <span class="nav-label"> Live Prices</span>
    </a>
  </div>

  <span class="spacer"></span>

  <!-- Auth Section -->
  @if (isAuthenticated()) {
    <!-- Authenticated: User Menu -->
    <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-trigger">
      <mat-icon>account_circle</mat-icon>
      <span class="nav-label">{{ username() }}</span>
      <mat-icon>arrow_drop_down</mat-icon>
    </button>
    <mat-menu #userMenu="matMenu">
      <a mat-menu-item routerLink="/trades/create">
        <mat-icon>add</mat-icon>
        <span>New Trade Idea</span>
      </a>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Sign Out</span>
      </button>
    </mat-menu>
  } @else {
    <!-- Not Authenticated: Login/Register -->
    <div class="auth-buttons">
      <a mat-button class="nav-link" routerLink="/login">Sign In</a>
      <a mat-raised-button color="accent" routerLink="/register">Register</a>
    </div>
  }
</mat-toolbar>
