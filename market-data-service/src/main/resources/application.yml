server:
  port: 8083

spring:
  application:
    name: market-data-service

  datasource:
    url: jdbc:postgresql://localhost:5432/investtrack_marketdata
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:}

# Kite Connect API Configuration
kite:
  api-key: ${KITE_API_KEY:}
  api-secret: ${KITE_API_SECRET:}
  redirect-url: http://localhost:8083/kite/callback
  login-url: https://kite.zerodha.com/connect/login

# Price Cache Configuration
price-cache:
  ttl-seconds: 60
  reconciliation-interval-ms: 300000

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.investtrack.marketdata: DEBUG
    org.springframework.data.redis: INFO
