server:
  port: 8084

spring:
  application:
    name: analytics-service

  datasource:
    url: jdbc:postgresql://localhost:5432/investtrack_analytics
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

# Ranking Configuration
ranking:
  weights:
    win-rate: 0.4
    avg-risk-reward: 0.3
    consistency: 0.2
    risk-control: 0.1
  min-trades-for-ranking: 5
  recalculation-cron: "0 0 */6 * * *"  # Every 6 hours

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.investtrack.analytics: DEBUG
